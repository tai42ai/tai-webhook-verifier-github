name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tai-webhook-verifier-github
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          path: tai-webhook-verifier-github
      # The committed uv.lock resolves the tai42 packages from these sibling
      # checkouts ([tool.uv.sources] paths), so CI clones them next to this repo.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ github.repository_owner }}/tai-contract
          path: tai-contract
          token: ${{ secrets.TAI_CI_TOKEN }}
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: "0.11.26"
          enable-cache: true
      - run: uv python install 3.13
      # --locked asserts the committed uv.lock is current; --python pins the
      # interpreter. The dev dependency group is installed by default.
      - run: uv sync --locked --python 3.13
      - name: Ruff
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Pyright
        run: uv run pyright
      - name: Pytest
        run: uv run pytest --cov --cov-report=term-missing
