name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tai-webhook-verifier-github
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: tai-webhook-verifier-github
      # The committed uv.lock resolves the tai42 packages from these sibling
      # checkouts ([tool.uv.sources] paths), so CI clones them next to this repo.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: ${{ github.repository_owner }}/tai-contract
          path: tai-contract
          token: ${{ secrets.TAI_CI_TOKEN }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.26"
          enable-cache: true
      - run: uv python install 3.13
      # --locked asserts the committed uv.lock is current; --python pins the
      # interpreter. The dev dependency group is installed by default.
      - run: uv sync --locked --python 3.13
      - name: Ruff
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Pyright
        run: uv run pyright
      - name: Pytest
        run: uv run pytest --cov --cov-report=term-missing
