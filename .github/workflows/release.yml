name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  # Builds and publishes to PyPI with an API token held as a repository
  # secret. The `pypi` environment scopes that secret to this job.
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          version: "0.11.26"
          enable-cache: true
      - run: uv python install 3.13
      # The pushed tag (v<version>) must match the version being built, so a
      # stale pyproject.toml can never publish under the wrong tag.
      - name: Assert tag matches pyproject version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match pyproject.toml version ${PYPROJECT_VERSION}" >&2
            exit 1
          fi
      - run: uv build
      - run: uvx twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          # Attestations are minted from the OIDC identity token, which token
          # auth does not issue.
          attestations: false
