name: Bug report
description: Report a defect in tai42-webhook-verifier-github (the GitHub webhook-signature verifier plugin)
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps or code that reproduce the problem.
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tai42-webhook-verifier-github version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, the host tai42-skeleton version, and how the webhook door and its secret are configured.
      placeholder: "Python 3.13.x, macOS 15"
    validations:
      required: true
